<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Trou dans un mur en plâtre">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0eae2"/>
      <stop offset="1" stop-color="#dfd7cb"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b99a72"/>
      <stop offset="1" stop-color="#a3835c"/>
    </linearGradient>
    <radialGradient id="hole" cx="0.42" cy="0.42" r="0.8">
      <stop offset="0" stop-color="#14100b"/>
      <stop offset="0.65" stop-color="#241a11"/>
      <stop offset="1" stop-color="#3d2e1d"/>
    </radialGradient>
    <radialGradient id="vign" cx="0.5" cy="0.42" r="0.95">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.16"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#wall)"/>

  <!-- plinthe + parquet -->
  <rect y="252" width="400" height="14" fill="#e6dfd4"/>
  <rect y="252" width="400" height="3" fill="#cfc5b6"/>
  <rect y="266" width="400" height="34" fill="url(#floor)"/>
  <g stroke="#8d6f4b" stroke-width="1" opacity="0.5">
    <line x1="0" y1="278" x2="400" y2="278"/>
    <line x1="0" y1="290" x2="400" y2="290"/>
    <line x1="120" y1="266" x2="120" y2="278"/>
    <line x1="255" y1="278" x2="255" y2="290"/>
    <line x1="60" y1="290" x2="60" y2="300"/>
    <line x1="330" y1="290" x2="330" y2="300"/>
  </g>

  <!-- plâtre arraché autour du trou -->
  <path d="M150 128 L172 100 L204 92 L238 100 L258 122 L264 152 L252 184 L222 200 L188 202 L160 186 L146 158 Z" fill="#f7f2e9"/>
  <path d="M158 130 L178 106 L205 99 L234 106 L251 126 L256 152 L246 178 L220 192 L190 194 L166 180 L154 156 Z" fill="#cfc3b0"/>

  <!-- trou -->
  <path d="M168 134 L186 114 L208 108 L230 116 L243 134 L246 154 L238 172 L217 183 L193 184 L174 172 L164 152 Z" fill="url(#hole)"/>

  <!-- éclats et fissures -->
  <g stroke="#a39682" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M150 128 L124 112"/>
    <path d="M146 160 L114 168"/>
    <path d="M258 124 L288 108"/>
    <path d="M262 160 L296 172"/>
    <path d="M226 200 L238 228"/>
  </g>
  <g fill="#e9e2d5">
    <path d="M172 236 l10 -4 6 6 -12 5 z"/>
    <path d="M208 244 l8 -3 5 5 -10 4 z"/>
    <path d="M236 238 l7 -3 4 4 -8 4 z"/>
  </g>
  <g fill="#c4b8a4">
    <path d="M190 249 l7 -3 4 4 -8 3 z"/>
    <path d="M226 250 l6 -2 3 3 -7 3 z"/>
  </g>

  <rect width="400" height="300" fill="url(#vign)"/>
</svg>
