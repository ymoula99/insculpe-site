<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Porte claquée, serrure bloquée">
  <defs>
    <linearGradient id="pwall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3dbcf"/>
      <stop offset="1" stop-color="#d2c8b9"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4efe7"/>
      <stop offset="1" stop-color="#e7e0d3"/>
    </linearGradient>
    <radialGradient id="pvign" cx="0.5" cy="0.45" r="0.95">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#pwall)"/>

  <!-- sol -->
  <rect y="272" width="400" height="28" fill="#a3835c"/>
  <line x1="0" y1="284" x2="400" y2="284" stroke="#8d6f4b" stroke-width="1" opacity="0.5"/>

  <!-- encadrement -->
  <rect x="66" y="18" width="268" height="254" fill="#f8f4ec"/>
  <rect x="66" y="18" width="268" height="254" fill="none" stroke="#d8cfc0" stroke-width="2"/>

  <!-- vantail -->
  <rect x="84" y="34" width="232" height="238" fill="url(#leaf)"/>
  <rect x="84" y="34" width="232" height="238" fill="none" stroke="#cec4b3" stroke-width="1.5"/>

  <!-- panneaux moulurés -->
  <g fill="none" stroke="#cabfab" stroke-width="2">
    <rect x="106" y="54" width="132" height="92" rx="2"/>
    <rect x="106" y="166" width="132" height="88" rx="2"/>
  </g>
  <g fill="none" stroke="#f9f6ef" stroke-width="1.5">
    <rect x="109" y="57" width="126" height="86" rx="2"/>
    <rect x="109" y="169" width="126" height="82" rx="2"/>
  </g>

  <!-- poignée béquille, tombée à la verticale -->
  <circle cx="278" cy="158" r="13" fill="#c29a58"/>
  <circle cx="278" cy="158" r="13" fill="none" stroke="#9a7638" stroke-width="1.5"/>
  <rect x="272" y="158" width="11" height="44" rx="5" fill="#c29a58" stroke="#9a7638" stroke-width="1.5" transform="rotate(8 278 158)"/>
  <!-- cylindre -->
  <circle cx="278" cy="192" r="7" fill="#b08a48"/>
  <rect x="275.5" y="187" width="5" height="10" rx="2" fill="#7c5c28"/>

  <!-- bois éclaté côté gâche -->
  <path d="M316 138 l14 -6 -8 12 12 -2 -10 12 11 2 -13 9 6 8 -12 -2 z" fill="#8a6a45"/>
  <path d="M316 146 l8 -2 -5 7 6 1 -7 6 z" fill="#5f472c"/>
  <g stroke="#b3a58f" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M316 130 l-14 -10"/>
    <path d="M316 176 l-10 12"/>
  </g>

  <rect width="400" height="300" fill="url(#pvign)"/>
</svg>
